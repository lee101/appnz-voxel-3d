<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Voxel 3D — open TripoSR Cog</title>
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <style>
      :root {
        color-scheme: dark;
        font:
          15px/1.5 Inter,
          system-ui;
        background: #080914;
        color: #f7f5ff;
        --violet: #b492ff;
        --cyan: #65f4ff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 25px;
        min-height: 100vh;
        background:
          radial-gradient(circle at 50% -15%, #3b276d, transparent 47%), #080914;
      }
      main {
        max-width: 1150px;
        margin: auto;
        display: grid;
        grid-template-columns: 0.9fr 1.1fr;
        gap: 18px;
      }
      .panel {
        border: 1px solid #c8b8ff2b;
        border-radius: 28px;
        background: #0e1020e8;
        padding: clamp(23px, 4vw, 48px);
      }
      .eyebrow {
        color: var(--cyan);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 0.72rem;
      }
      h1 {
        font-size: clamp(3.5rem, 8vw, 7.5rem);
        line-height: 0.8;
        letter-spacing: -0.065em;
        margin: 0.3em 0;
      }
      p {
        color: #b6b6ca;
      }
      .stage {
        min-height: 620px;
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
        background: linear-gradient(150deg, #151834, #0b0d19);
      }
      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(#75f3ff12 1px, transparent 1px),
          linear-gradient(90deg, #75f3ff12 1px, transparent 1px);
        background-size: 34px 34px;
        transform: perspective(500px) rotateX(55deg) scale(1.5);
        transform-origin: bottom;
      }
      .cube {
        width: 190px;
        aspect-ratio: 1;
        background: linear-gradient(135deg, var(--violet), #4a2fa1);
        box-shadow:
          38px 38px 0 #201450,
          76px 76px 0 #100a29;
        transform: rotate(18deg);
        animation: bob 4s ease-in-out infinite;
      }
      @keyframes bob {
        50% {
          transform: rotate(25deg) translateY(-18px);
        }
      }
      label {
        display: block;
        margin-top: 14px;
        font-size: 0.8rem;
        font-weight: 800;
      }
      input,
      select,
      button {
        width: 100%;
        padding: 13px;
        margin-top: 6px;
        border-radius: 12px;
        border: 1px solid #d9ceff2c;
        background: #090a14;
        color: white;
      }
      button {
        background: linear-gradient(90deg, var(--violet), var(--cyan));
        color: #080914;
        font-weight: 950;
        cursor: pointer;
      }
      .two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      a {
        color: var(--cyan);
      }
      model-viewer {
        display: none;
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background: #111327;
      }
      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
        }
        .stage {
          min-height: 440px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <span class="eyebrow">TripoSR + voxel pipeline · MIT</span>
        <h1>One image. Real geometry.</h1>
        <p>
          Remove the background, reconstruct a colored mesh, then optionally
          quantize it into production-ready voxel blocks—all inside one
          self-hosted Cog.
        </p>
        <label
          >Cog model id<input
            id="id"
            value="5c6e85e1-676d-4ab3-a646-aedc92d40cf3"
            aria-label="Deployed Cog model id" /></label
        ><label
          >Object image<input id="file" type="file" accept="image/*"
        /></label>
        <div class="two">
          <label
            >Geometry<select id="style">
              <option>voxel48</option>
              <option>voxel32</option>
              <option>voxel64</option>
              <option>mesh</option>
            </select></label
          ><label
            >Surface detail<select id="resolution">
              <option>256</option>
              <option>192</option>
              <option>128</option>
            </select></label
          >
        </div>
        <button id="run">Build interactive GLB</button>
        <p id="status">
          <a href="https://github.com/lee101/appnz-voxel-3d"
            >Deploy from GitHub</a
          >. Best results: one object, simple background.
        </p>
      </section>
      <section class="panel stage">
        <div class="grid"></div>
        <div class="cube"></div>
        <model-viewer
          id="viewer"
          camera-controls
          auto-rotate
          shadow-intensity="1"
          environment-image="neutral"
        ></model-viewer>
      </section>
    </main>
    <script>
      const $ = (x) => document.getElementById(x),
        data = (f) =>
          new Promise((ok) => {
            const r = new FileReader();
            r.onload = () => ok(r.result);
            r.readAsDataURL(f);
          });
      $("run").onclick = async () => {
        const f = $("file").files[0],
          id = $("id").value.trim();
        if (!f || !id) {
          $("status").textContent = "Choose an image and add a model id.";
          return;
        }
        $("status").textContent = "Reconstructing and voxelizing…";
        try {
          const r = await fetch(
              `https://app.nz/api/cogs/${encodeURIComponent(id)}/predict`,
              {
                method: "POST",
                credentials: "include",
                headers: { "content-type": "application/json" },
                body: JSON.stringify({
                  input: {
                    image: await data(f),
                    style: $("style").value,
                    foreground_ratio: 0.85,
                    mc_resolution: Number($("resolution").value),
                  },
                }),
              },
            ),
            b = await r.json();
          if (!r.ok) throw Error(b.error || "Prediction failed");
          const out = b.output || b.prediction?.output;
          if (out) {
            $("viewer").src = out;
            $("viewer").style.display = "block";
          }
          $("status").textContent = out
            ? "Drag to orbit your GLB."
            : "Queued — follow it in Cog Studio.";
        } catch (e) {
          $("status").textContent = e.message;
        }
      };
    </script>
  </body>
</html>
